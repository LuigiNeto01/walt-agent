services:
  api:
    build:
      context: ./backend
    container_name: walt-agent-api
    env_file:
      - path: ./backend/.env
        required: false
    environment:
      DATABASE_URL: postgresql+psycopg://walt:walt@db:5432/walt_agent
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: /api/v1
    container_name: walt-agent-frontend
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "5173:80"
    depends_on:
      - api

  db:
    image: postgres:16-alpine
    container_name: walt-agent-db
    environment:
      POSTGRES_USER: walt
      POSTGRES_PASSWORD: walt
      POSTGRES_DB: walt_agent
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U walt -d walt_agent"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
